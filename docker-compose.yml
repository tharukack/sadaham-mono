services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_SENDER_ID: ${TWILIO_SENDER_ID}
      SMS_BATCH_WORKER: ${SMS_BATCH_WORKER}
      SMS_BATCH_WORKER_INTERVAL_MS: ${SMS_BATCH_WORKER_INTERVAL_MS}
      SMS_BATCH_WORKER_LIMIT: ${SMS_BATCH_WORKER_LIMIT}
      BACKUP_RUNTIME_DIR: /app/.backup-runtime
      BACKUP_DRIVE_ROOT_FOLDER: ${BACKUP_DRIVE_ROOT_FOLDER}
      BACKUP_RETENTION_MONTHS: ${BACKUP_RETENTION_MONTHS}
      BACKUP_UNCHANGED_INTERVAL_DAYS: ${BACKUP_UNCHANGED_INTERVAL_DAYS}
      BACKUP_CHECK_INTERVAL_MINUTES: ${BACKUP_CHECK_INTERVAL_MINUTES}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backup_runtime:/app/.backup-runtime
    expose:
      - "4000"
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: infra/backup/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      BACKUP_RUNTIME_DIR: /app/.backup-runtime
      BACKUP_DRIVE_ROOT_FOLDER: ${BACKUP_DRIVE_ROOT_FOLDER}
      BACKUP_RETENTION_MONTHS: ${BACKUP_RETENTION_MONTHS}
      BACKUP_UNCHANGED_INTERVAL_DAYS: ${BACKUP_UNCHANGED_INTERVAL_DAYS}
      BACKUP_CHECK_INTERVAL_MINUTES: ${BACKUP_CHECK_INTERVAL_MINUTES}
      GOOGLE_DRIVE_CREDENTIALS_FILE: /app/credentials.json
      PG_DUMP_COMMAND: /usr/lib/postgresql/16/bin/pg_dump
      TZ: ${TZ}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - backup_runtime:/app/.backup-runtime
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  backup_runtime:
  caddy_data:
  caddy_config: